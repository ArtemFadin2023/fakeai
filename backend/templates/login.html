<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - FakeNewsAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <style>
        /* Disable RGB/gradient overflow animations on login page */
        body {
            animation: none !important;
            background: #0f172a !important;
        }
        body::before,
        body::after {
            animation: none !important;
            background-image: none !important;
        }
        .progress-bar-fill,
        .card::before {
            animation: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo" aria-hidden="true">🔐 FakeNewsAI</div>
                <h1 class="title" id="title">Вход</h1>
                <p class="subtitle" id="subtitle">Войдите в свой аккаунт</p>
            </div>

            <form class="form" onsubmit="handleSubmit(event)" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">👤</span>
                        <input
                            type="text"
                            id="login"
                            class="input"
                            placeholder="Логин"
                            autocomplete="username"
                            minlength="4"
                            maxlength="32"
                            pattern="[a-zA-Z0-9_-]+"
                            required
                            aria-label="Логин"
                            aria-describedby="login-hint"
                        >
                    </div>
                    <div class="input-hint" id="login-hint" aria-live="polite"></div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">🔑</span>
                        <input
                            type="password"
                            id="password"
                            class="input"
                            placeholder="Пароль"
                            autocomplete="current-password"
                            minlength="6"
                            maxlength="128"
                            required
                            aria-label="Пароль"
                            aria-describedby="password-hint"
                        >
                    </div>
                    <div class="input-hint" id="password-hint" aria-live="polite"></div>
                </div>

                <div class="forgot-section">
                    <button type="button" class="forgot-link" onclick="showForgotModal()">Забыли пароль?</button>
                </div>

                <div class="validation-container" aria-live="polite">
                    <div class="validation-header">
                        <span class="validation-title">✓ Проверка данных</span>
                        <span class="validation-score" id="score">0%</span>
                    </div>
                    <div class="progress-bar-container" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-labelledby="score">
                        <div class="progress-bar-fill" id="progress"></div>
                    </div>
                    <div class="validation-checks">
                        <div class="check-item" id="check-login">
                            <div class="check-icon">✓</div>
                            <span>Логин минимум 4 символа и только латиница/цифры</span>
                        </div>
                        <div class="check-item" id="check-password">
                            <div class="check-icon">✓</div>
                            <span>Пароль минимум 6 символов</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="button" id="btn" disabled>
                    <span class="spinner"></span>
                    <span class="button-text" id="button-text">Войти</span>
                </button>
            </form>

            <div class="toggle-section">
                <span class="toggle-text" id="toggle-text">Нет аккаунта?</span>
                <button type="button" class="toggle-btn" id="toggle-btn" onclick="toggleMode()">Зарегистрироваться</button>
            </div>
        </div>
    </div>

    <div class="popup" id="popup" role="status" aria-live="polite">
        <div class="popup-content">
            <span class="popup-icon" id="popup-icon"></span>
            <span id="popup-text"></span>
        </div>
    </div>

    <script>
        let mode = 'login';
        let isLoading = false;

        const loginInput = document.getElementById('login');
        const passwordInput = document.getElementById('password');
        const button = document.getElementById('btn');
        const titleEl = document.getElementById('title');
        const subtitleEl = document.getElementById('subtitle');
        const buttonTextEl = document.getElementById('button-text');
        const toggleTextEl = document.getElementById('toggle-text');
        const toggleBtnEl = document.getElementById('toggle-btn');
        const loginHintEl = document.getElementById('login-hint');
        const passwordHintEl = document.getElementById('password-hint');
        const loginCheckEl = document.getElementById('check-login');
        const passwordCheckEl = document.getElementById('check-password');
        const progressEl = document.getElementById('progress');
        const scoreEl = document.getElementById('score');
        const progressContainerEl = document.querySelector('.progress-bar-container');

        function validateLogin(value) {
            return value.length >= 4 && /^[a-zA-Z0-9_-]+$/.test(value);
        }

        function validatePassword(value) {
            return value.length >= 6;
        }

        function updateValidation() {
            const login = loginInput.value.trim();
            const password = passwordInput.value.trim();

            const loginValid = validateLogin(login);
            const passwordValid = validatePassword(password);

            loginInput.classList.toggle('valid', loginValid);
            loginInput.classList.toggle('invalid', login.length > 0 && !loginValid);

            passwordInput.classList.toggle('valid', passwordValid);
            passwordInput.classList.toggle('invalid', password.length > 0 && !passwordValid);

            loginHintEl.textContent =
                loginValid ? '✓ Логин подходит' :
                login.length > 0 ? `✗ Еще ${Math.max(0, 4 - login.length)} символов` :
                '';

            passwordHintEl.textContent =
                passwordValid ? '✓ Пароль подходит' :
                password.length > 0 ? `✗ Еще ${Math.max(0, 6 - password.length)} символов` :
                '';

            loginCheckEl.classList.toggle('passed', loginValid);
            passwordCheckEl.classList.toggle('passed', passwordValid);

            let score = 0;
            if (loginValid) score += 50;
            if (passwordValid) score += 50;

            progressEl.style.width = score + '%';
            scoreEl.textContent = score + '%';
            progressContainerEl.setAttribute('aria-valuenow', String(score));

            button.disabled = score < 100 || isLoading;
            button.style.opacity = button.disabled ? '0.5' : '1';
        }

        loginInput.addEventListener('input', updateValidation);
        passwordInput.addEventListener('input', updateValidation);

        function showPopup(message, type = 'info') {
            const popup = document.getElementById('popup');
            const icon = document.getElementById('popup-icon');
            const text = document.getElementById('popup-text');

            text.textContent = message;
            popup.classList.remove('success', 'error', 'info');
            popup.classList.add(type);

            icon.textContent =
                type === 'success' ? '✓' :
                type === 'error' ? '✕' :
                'ℹ';

            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 3000);
        }

        async function readResponseData(response) {
            const contentType = response.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                try {
                    return await response.json();
                } catch {
                    return {};
                }
            }
            return {};
        }

        async function handleSubmit(e) {
            e.preventDefault();

            if (isLoading) return;
            if (button.disabled) {
                showPopup('✗ Проверьте логин и пароль', 'error');
                return;
            }

            isLoading = true;
            button.classList.add('loading');
            button.setAttribute('aria-busy', 'true');
            updateValidation();

            try {
                const login = loginInput.value.trim();
                const password = passwordInput.value.trim();

                const endpoint = mode === 'register' ? '/register' : '/login';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });

                const data = await readResponseData(response);

                if (!response.ok) {
                    if (mode === 'login' && response.status === 401) {
                        showPopup('✗ Неверный логин или пароль', 'error');
                    } else if (mode === 'register' && response.status === 409) {
                        showPopup('✗ Логин уже занят', 'error');
                    } else {
                        showPopup('✗ Ошибка сервера', 'error');
                    }
                    return;
                }

                if (mode === 'register') {
                    if (data.status === 'ok') {
                        showPopup('✓ Аккаунт создан! Переход...', 'success');
                        setTimeout(() => {
                            window.location.href = data.redirect || '/';
                        }, 1500);
                    } else if (data.status === 'exists') {
                        showPopup('✗ Логин уже занят', 'error');
                    } else {
                        showPopup('✗ Ошибка регистрации', 'error');
                    }
                } else if (data.status === 'ok') {
                    showPopup('✓ Вход успешен! Переход...', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || '/';
                    }, 1500);
                } else {
                    showPopup('✗ Неверный логин или пароль', 'error');
                }
            } catch (error) {
                console.error('Auth request error:', error);
                showPopup('✗ Сервер недоступен. Запустите backend/app.py', 'error');
            } finally {
                isLoading = false;
                button.classList.remove('loading');
                button.removeAttribute('aria-busy');
                updateValidation();
            }
        }

        function toggleMode() {
            mode = mode === 'login' ? 'register' : 'login';

            const isRegisterMode = mode === 'register';

            titleEl.textContent = isRegisterMode ? 'Регистрация' : 'Вход';
            subtitleEl.textContent = isRegisterMode ? 'Создайте аккаунт' : 'Войдите в свой аккаунт';
            toggleTextEl.textContent = isRegisterMode ? 'Уже есть аккаунт?' : 'Нет аккаунта?';
            toggleBtnEl.textContent = isRegisterMode ? 'Войти' : 'Зарегистрироваться';
            buttonTextEl.textContent = isRegisterMode ? 'Зарегистрироваться' : 'Войти';
            passwordInput.autocomplete = isRegisterMode ? 'new-password' : 'current-password';

            loginInput.value = '';
            passwordInput.value = '';
            loginInput.classList.remove('valid', 'invalid');
            passwordInput.classList.remove('valid', 'invalid');
            loginHintEl.textContent = '';
            passwordHintEl.textContent = '';

            updateValidation();
        }

        function showForgotModal() {
            const login = loginInput.value.trim();
            if (!login) {
                showPopup('✗ Введите логин', 'error');
                return;
            }

            showPopup('ℹ Восстановление пароля пока в разработке', 'info');
        }

        updateValidation();
    </script>

</body>
</html>
