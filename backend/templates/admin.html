<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
    <title>Админ Панель - FakeNewsAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-page">

    <!-- HEADER -->
    <div class="header">
        <h2>👑 Администрирование</h2>
        <button class="back-btn" onclick="location.href='/'">← Вернуться</button>
    </div>

    <!-- SEARCH -->
    <div class="search">
        <input id="search" placeholder="Поиск по логину..." oninput="render()">
    </div>

    <!-- USERS LIST -->
    <div id="list">
        <div class="loader"></div>
    </div>

    <script>
        let users = [];

        // ===== MOUSE GLOW EFFECT =====
        document.addEventListener('mousemove', (e) => {
            document.querySelectorAll('.user').forEach(card => {
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--x', (e.clientX - rect.left) + 'px');
                card.style.setProperty('--y', (e.clientY - rect.top) + 'px');
            });
        });

        // ===== LOAD USERS =====
        async function load() {
            try {
                const res = await fetch('/admin/users');
                
                if (!res.ok) {
                    if (res.status === 403) {
                        window.location.href = '/profile';
                        return;
                    }
                    throw new Error('Failed to load users');
                }
                
                users = await res.json();
                render();
            } catch (error) {
                console.error('Load error:', error);
                document.getElementById('list').innerHTML = '❌ Ошибка загрузки пользователей';
            }
        }

        // ===== RENDER =====
        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('list');

            const filtered = users.filter(u => 
                u.login.toLowerCase().includes(q)
            );

            if (filtered.length === 0 && q) {
                list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Пользователей не найдено</div></div>';
                return;
            }

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Нет пользователей</div></div>';
                return;
            }

            list.innerHTML = '';

            filtered.forEach((u, i) => {
                const div = document.createElement('div');
                div.className = 'user';
                div.style.animationDelay = (i * 0.05) + 's';

                const lastLogin = u.last_login === 'Никогда' ? 
                    '<span class="user-status never">🔴 Никогда</span>' :
                    '<span class="user-status">🟢 ' + u.last_login + '</span>';

                div.innerHTML = `
                    <div class="user-field">
                        <div class="user-field-icon">👤</div>
                        <div class="user-field-content">
                            <div class="user-field-label">Логин</div>
                            <div class="login">${escapeHtml(u.login)}</div>
                        </div>
                    </div>
                    
                    <div class="user-field">
                        <div class="user-field-icon">📅</div>
                        <div class="user-field-content">
                            <div class="user-field-label">Дата регистрации</div>
                            <div class="user-info">${u.created}</div>
                        </div>
                    </div>
                    
                    <div class="user-field">
                        <div class="user-field-icon">⏱️</div>
                        <div class="user-field-content">
                            <div class="user-field-label">Последний вход</div>
                            ${lastLogin}
                        </div>
                    </div>
                `;

                list.appendChild(div);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== INIT =====
        load();
    </script>

</body>
</html>
