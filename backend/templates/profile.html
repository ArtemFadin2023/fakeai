<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
    <title>Профиль - FakeNewsAI</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box} :root{
      --bg:#0a0e27;--bg2:#111827;--card:rgba(30,41,59,0.6);
  --border:rgba(148,163,184,0.12);--accent:#8b5cf6;--accent2:#7c3aed;
    --text:#f1f5f9;--muted:#94a3b8;--success:#10b981;--danger:#ef4444;--warn:#f59e0b;
      }
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);
        min-height:100vh;color:var(--text);padding:16px;padding-bottom:40px;overflow-x:hidden;
  }
        
        body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;
            background:radial-gradient(circle at 20% 80%,rgba(139,92,246,0.08) 0%,transparent 50%),
      radial-gradient(circle at 80% 20%,rgba(236,72,153,0.06) 0%,transparent 50%);
      animation: bgPulse 10s ease-in-out infinite alternate;}
        @keyframes bgPulse{
      0%{opacity:0.5; transform:scale(1);}
      100%{opacity:1; transform:scale(1.1);}
 }

        .container{max-width:600px;margin:0 auto;opacity:0;animation:fadeInUp 0.8s 0.2s ease forwards;}

        .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;opacity:0;animation:slideIn 0.5s 0.4s ease forwards;}
   .page-title{font-size:22px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#ec4899);
     -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
   position:relative;}
     .page-title::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;
       background:linear-gradient(90deg,#a78bfa,#ec4899);animation:expandLine 0.6s 1s ease forwards;}
  @keyframes expandLine{to{width:100%;}}

        .back-btn{padding:8px 16px;border:1.5px solid rgba(139,92,246,0.3);border-radius:10px;
background:rgba(139,92,246,0.1);color:#a78bfa;font-size:13px;font-weight:600;
            cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden;}
        .back-btn::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;
        background:rgba(139,92,246,0.2);border-radius:50%;transform:translate(-50%,-50%);transition:width 0.4s,height 0.4s;}
        .back-btn:hover::before{width:150px;height:150px;}
   .back-btn:hover{background:rgba(139,92,246,0.2);transform:translateX(-3px);box-shadow:0 0 15px rgba(139,92,246,0.3);}

        .card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border); border-radius:16px;padding:18px;margin-bottom:14px; opacity:0;transform:translateY(20px);
        animation:cardAppear 0.5s ease forwards;}
        .card:nth-child(2){animation-delay:0.5s;}
        .card:nth-child(3){animation-delay:0.6s;}
        .card:nth-child(4){animation-delay:0.7s;}
        .card:nth-child(5){animation-delay:0.8s;}
@keyframes cardAppear{to{opacity:1;transform:translateY(0);}}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
            letter-spacing:0.8px;margin-bottom:14px;position:relative;display:inline-block;}
     .card-title::after{content:'';position:absolute;bottom:-2px;left:0;width:30px;height:1px;
       background:var(--accent);}

   .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .stat{background:rgba(15,23,42,0.7);border:1px solid var(--border);border-radius:12px;
            padding:12px 8px;text-align:center;transition:all 0.3s ease;
            position:relative;overflow:hidden;}
        .stat:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 10px 20px rgba(139,92,246,0.2);}
        .stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
       background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transition:transform 0.4s;}
        .stat:hover::before{transform:scaleX(1);}
     .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
   .stat-value{font-size:20px;font-weight:700;color:var(--accent);
  transition:color 0.3s;display:inline-block;}.stat:hover .stat-value{color:#c4b5fd;transform:scale(1.1);}

  .sub-banner{border-radius:14px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;}
        .sub-banner.active{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(139,92,246,0.15));
     border:1px solid rgba(16,185,129,0.3);animation:glowGreen 2s infinite alternate;}
        .sub-banner.inactive{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);}
    @keyframes glowGreen{from{box-shadow:0 0 10px rgba(16,185,129,0.1);}to{box-shadow:0 0 25px rgba(16,185,129,0.3);}}
        
        .sub-status{font-size:16px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
        .sub-status.active{color:var(--success);}
        .sub-status.inactive{color:var(--danger);animation:shake 0.5s ease;}
        @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
           .sub-detail{font-size:13px;color:var(--muted);}
        .sub-bar{height:4px;border-radius:4px;background:rgba(255,255,255,0.1);margin-top:10px;overflow:hidden;}
.sub-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--success),var(--accent));
     transition:width 1.5s cubic-bezier(0.25,0.46,0.45,0.94);position:relative;}
     .sub-bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
       background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2s infinite;}

        .info-row{display:flex;align-items:center;justify-content:space-between;
   padding:11px 0;border-bottom:1px solid var(--border);transition:background 0.3s;
          border-radius:8px;padding-left:8px;padding-right:8px;}
   .info-row:hover{background:rgba(139,92,246,0.05);}
        .info-row:last-child{border-bottom:none;}
      .info-left{flex:1;min-width:0;}
  .info-key{font-size:11px;color:var(--muted);margin-bottom:2px;transition:color 0.3s;}
  .info-row:hover .info-key{color:var(--accent);}
        .info-val{font-size:14px;font-weight:600;color:var(--text);
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.3s;}
        .info-val.accent{color:var(--accent);}
           .edit-btn{padding:5px 12px;border:1.5px solid rgba(139,92,246,0.3);border-radius:8px;
background:rgba(139,92,246,0.1);color:#a78bfa;font-size:12px;font-weight:600;
      cursor:pointer;transition:all 0.3s ease;white-space:nowrap;margin-left:10px;flex-shrink:0;
            position:relative;overflow:hidden;}
   .edit-btn:hover{background:rgba(139,92,246,0.25);border-color:var(--accent);color:white;
       transform:scale(1.05);box-shadow:0 0 10px rgba(139,92,246,0.4);}

   .key-row{display:flex;gap:8px;margin-top:14px;}
    .key-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
background:rgba(15,23,42,0.8);color:var(--text);font-size:14px;font-family:monospace;
letter-spacing:1px;outline:none;transition:all 0.4s ease;}
        .key-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,0.15);
transform:scale(1.02);background:rgba(15,23,42,0.95);}
        .key-input::placeholder{letter-spacing:0;font-family:inherit;color:var(--muted);}
        .key-btn{padding:10px 16px;border:none;border-radius:10px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;font-size:13px;font-weight:600;cursor:pointer;
      transition:all 0.3s ease;white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden;}
        .key-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,92,246,0.35);}
     .key-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
      background:linear-gradient(transparent,rgba(255,255,255,0.1),transparent);
            transform:rotate(45deg);transition:left 0.5s;}
        .key-btn:hover::after{left:100%;}

        .actions{display:flex;flex-direction:column;gap:8px;}
        .action-btn{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);
background:rgba(15,23,42,0.5);color:var(--text);font-size:14px;font-weight:600;
cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all 0.3s ease;
            position:relative;overflow:hidden;}
     .action-btn::before{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;
       background:linear-gradient(90deg,transparent,rgba(139,92,246,0.1),transparent);transition:left 0.6s;}
   .action-btn:hover::before{left:100%;}
        .action-btn:hover{border-color:rgba(139,92,246,0.4);background:rgba(139,92,246,0.1);transform:translateX(5px);}
        .action-btn.danger{border-color:rgba(239,68,68,0.2);color:#f87171;}
        .action-btn.danger:hover{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.5);}

        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);
      backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:16px;
      animation:fadeIn 0.3s ease;}
        .modal.active{display:flex;}
        .modal-box{background:#1e293b;border:1px solid rgba(139,92,246,0.2);border-radius:20px;
       padding:24px 20px;width:100%;max-width:400px;
      animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);position:relative;}
      @keyframes popIn{from{opacity:0;transform:scale(0.8) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-title{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text);
        background:linear-gradient(135deg,#a78bfa,#ec4899);-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;background-clip:text;}
        .modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;
   border:none;background:rgba(239,68,68,0.1);color:#f87171;font-size:14px;
       cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
        .modal-close:hover{background:rgba(239,68,68,0.25);transform:rotate(90deg);}
             .field{margin-bottom:12px;}
        .field label{display:block;font-size:11px;color:var(--muted);font-weight:600;
     text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;transition:color 0.3s;}
        .field input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;
            background:rgba(15,23,42,0.8);color:var(--text);font-size:14px;transition:all 0.3s ease;outline:none;}
 .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,0.15);
transform:scale(1.02);background:rgba(15,23,42,1);}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
    .btn-primary{flex:1;padding:11px;border:none;border-radius:10px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
   color:white;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s ease;
            position:relative;overflow:hidden;}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,92,246,0.35);}
     .btn-cancel{padding:11px 18px;border:1.5px solid var(--border);border-radius:10px;
  background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s;}
        .btn-cancel:hover{background:rgba(255,255,255,0.05);color:white;}

        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
background:rgba(15,23,42,0.95);border:1px solid var(--accent);color:var(--text);
    padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;
          z-index:9999;opacity:0;transition:all 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
 backdrop-filter:blur(20px);white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.error{border-color:var(--danger);animation:toastShake 0.5s ease;}
        .toast.success{border-color:var(--success);}
        @keyframes toastShake{0%,100%{transform:translateX(-50%) translateY(0);}25%{transform:translateX(-48%) translateY(0);}75%{transform:translateX(-52%) translateY(0);}}

@keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        @keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

        @media(max-width:480px){
            body{padding:12px;padding-bottom:32px;}
            .stats-grid{gap:8px;}
            .stat{padding:10px 6px;}
    .stat-value{font-size:18px;}
            .card{padding:14px;}
        }
    </style>
</head>
<body>
<div class="container">

    <div class="page-header">
        <div class="page-title">👤 Профиль</div>
        <button class="back-btn" onclick="location.href='/'">← Назад</button>
    </div>

    <!-- SUBSCRIPTION BANNER -->
    <div class="sub-banner inactive" id="subBanner">
        <div class="sub-status inactive" id="subStatus">⚡ Загрузка...</div>
        <div class="sub-detail" id="subDetail">Проверяем статус подписки</div>
        <div class="sub-bar"><div class="sub-bar-fill" id="subBar" style="width:0%"></div></div>
    </div>

    <!-- STATS -->
    <div class="card">
        <div class="card-title">Статистика</div>
        <div class="stats-grid">
            <div class="stat">
                <div class="stat-label">Чатов</div>
                <div class="stat-value" id="chatCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Сообщений</div>
                <div class="stat-value" id="msgCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Использовано</div>
                <div class="stat-value" id="usedCount">0</div>
            </div>
        </div>
    </div>

    <!-- ACCOUNT -->
    <div class="card">
        <div class="card-title">Аккаунт</div>
        <div class="info-row">
            <div class="info-left">
                <div class="info-key">Логин</div>
                <div class="info-val accent" id="userName">...</div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-left">
                <div class="info-key">Email</div>
                <div class="info-val" id="userEmail">Не указан</div>
            </div>
            <button class="edit-btn" onclick="openModal('emailModal')">✏️ Изменить</button>
        </div>
        <div class="info-row">
            <div class="info-left">
                <div class="info-key">Пароль</div>
                <div class="info-val">••••••••</div>
            </div>
            <button class="edit-btn" onclick="openModal('passModal')">✏️ Изменить</button>
        </div>
    </div>

    <!-- ACTIVATION KEY -->
    <div class="card">
        <div class="card-title">🔑 Активировать подписку</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:0;">Введите ключ активации для получения подписки</div>
        <div class="key-row">
            <input class="key-input" id="keyInput" placeholder="XXXXX-XXXXX-XXXXX-XXXXX" maxlength="23"
                   autocomplete="off" autocorrect="off" autocapitalize="characters"
                   spellcheck="false" inputmode="text" data-lpignore="true" data-form-type="other"
                   readonly onfocus="this.removeAttribute('readonly')" oninput="formatKey(this)">
            <button class="key-btn" type="button" onclick="pasteActivationKey()">Вставить</button>
            <button class="key-btn" type="button" onclick="activateKey()">Активировать</button>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="card">
        <div class="card-title">Действия</div>
        <div class="actions">
            <button class="action-btn" onclick="clearChats()">🗑️ Очистить все чаты</button>
            <button class="action-btn" onclick="openAdminLogin()">👑 Админ панель</button>
            <button class="action-btn danger" onclick="doLogout()">⎋ Выйти из аккаунта</button>
        </div>
    </div>

</div>

<!-- MODAL: CHANGE PASSWORD -->
<div class="modal" id="passModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('passModal')">✕</button>
        <div class="modal-title">🔒 Сменить пароль</div>
        <div class="field"><label>Текущий пароль</label>
            <input type="password" id="currentPass" placeholder="Текущий пароль"></div>
        <div class="field"><label>Новый пароль</label>
            <input type="password" id="newPass" placeholder="Минимум 6 символов"></div>
        <div class="field"><label>Повторите пароль</label>
            <input type="password" id="confirmPass" placeholder="Повторите новый пароль"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('passModal')">Отмена</button>
            <button class="btn-primary" onclick="changePassword()">Сохранить</button>
        </div>
    </div>
</div>

<!-- MODAL: CHANGE EMAIL -->
<div class="modal" id="emailModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('emailModal')">✕</button>
        <div class="modal-title">📧 Изменить email</div>
        <div class="field"><label>Email адрес</label>
            <input type="email" id="newEmail" placeholder="example@mail.com"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('emailModal')">Отмена</button>
            <button class="btn-primary" onclick="changeEmail()">Сохранить</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
function animateValue(id, start, end, duration) {
    const obj = document.getElementById(id);
    if(obj === null) return;
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        const current = Math.floor(progress * (end - start) + start);
        obj.textContent = current;
        if (progress < 1) {
            window.requestAnimationFrame(step);
        } else {
            obj.textContent = end;
        }
    };
    window.requestAnimationFrame(step);
}

function showToast(msg, type='info'){
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + (type||'');
    clearTimeout(t._t); t._t = setTimeout(() => t.className = 'toast', 3000);
}
function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){
    document.getElementById(id).classList.remove('active');
    document.getElementById(id).querySelectorAll('input').forEach(i => i.value = '');
}
document.querySelectorAll('.modal').forEach(m => {
    m.addEventListener('click', e => { if(e.target === m) closeModal(m.id); });
});

function formatKey(input){
    let v = input.value.replace(/[^A-Z0-9]/gi,'').toUpperCase();
    let parts = [];
    for(let i = 0; i < v.length && i < 20; i += 5) parts.push(v.slice(i, i+5));
    input.value = parts.join('-');
}

async function pasteActivationKey(){
    if(!navigator.clipboard || !navigator.clipboard.readText){
        showToast('Буфер обмена недоступен', 'error');
        return;
    }
    try{
        const text = await navigator.clipboard.readText();
        if(!text || !text.trim()){
            showToast('Буфер обмена пуст', 'error');
            return;
        }
        const keyInput = document.getElementById('keyInput');
        keyInput.value = text.trim();
        formatKey(keyInput);
        showToast('Вставлено из буфера', 'success');
    }catch(e){
        showToast('Не удалось прочитать буфер', 'error');
    }
}

async function load(){
    try{
        const res = await fetch('/me');
        const data = await res.json();
        if(!data.user){ window.location.href = '/login_page'; return; }
        document.getElementById('userName').textContent = data.user;
        document.getElementById('userEmail').textContent = data.email || 'Не указан';
        document.getElementById('keyInput').value = '';
        if(data.email) document.getElementById('newEmail').value = data.email;
 
        const usedVal = data.sub?.messages_used || 0;
        animateValue('usedCount', 0, usedVal, 800);

        const sub = data.sub;
        const banner = document.getElementById('subBanner');
        const status = document.getElementById('subStatus');
        const detail = document.getElementById('subDetail');
        const bar = document.getElementById('subBar');
        if(sub && sub.active){
            banner.className = 'sub-banner active';
            status.className = 'sub-status active';
            status.textContent = '✅ Подписка активна';
            if(sub.type === 'lifetime'){
                detail.textContent = 'Бессрочная подписка';
                bar.style.width = '100%';
            } else {
                detail.textContent = 'Действует до: ' + sub.until;
                const now = new Date(); const end = new Date(sub.until);
                const total = 30 * parseInt(sub.type) * 24 * 3600 * 1000;
                const left = end - now; const pct = Math.max(5, Math.min(100, left/total*100));
                bar.style.width = pct + '%';
            }
        } else {
            banner.className = 'sub-banner inactive';
            status.className = 'sub-status inactive';
            status.textContent = '❌ Подписка не активна';
            const used = sub?.messages_used || 0; const left = Math.max(0, 20 - used);
            detail.textContent = `Бесплатно: осталось ${left} из 20 сообщений`;
            bar.style.width = (used/20*100) + '%';
            bar.style.background = 'linear-gradient(90deg,#ef4444,#f59e0b)';
        }

        const chatsRes = await fetch('/chats');
        const chats = await chatsRes.json();
        animateValue('chatCount', 0, chats.length, 1000);
        let total = 0;
        for(const c of chats) total += c.message_count || 0;
        animateValue('msgCount', 0, total, 1200);
    }catch(e){ console.error(e); }
}

async function activateKey(){
    const key = document.getElementById('keyInput').value.trim();
    const currentUser = (document.getElementById('userName').textContent || '').trim().toUpperCase();
    if(!key) return showToast('Введите ключ', 'error');
    if(key.toUpperCase() === currentUser) return showToast('Введите ключ активации, а не логин', 'error');
    try{
        const res = await fetch('/activate_key', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key})});
        const data = await res.json();
        if(data.status === 'ok'){ showToast('✓ Подписка активирована!', 'success'); load(); }
        else showToast('✗ ' + (data.message || 'Ошибка'), 'error');
    }catch(e){ showToast('✗ Ошибка сервера', 'error'); }
}

async function changePassword(){
    const current = document.getElementById('currentPass').value;
    const newp = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;
    if(!current || !newp || !confirm) return showToast('Заполните все поля', 'error');
    if(newp !== confirm) return showToast('Пароли не совпадают', 'error');
    if(newp.length < 6) return showToast('Пароль минимум 6 символов', 'error');
    try{
        const res = await fetch('/change_password', {method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({current_password:current, new_password:newp})});
        const data = await res.json();
        if(data.status === 'ok'){ showToast('✓ Пароль изменён', 'success'); closeModal('passModal'); }
        else showToast('✗ ' + (data.message || 'Ошибка'), 'error');
    }catch(e){ showToast('✗ Ошибка сервера', 'error'); }
}

async function changeEmail(){
    const email = document.getElementById('newEmail').value.trim();
    if(!email) return showToast('Введите email', 'error');
    try{
        const res = await fetch('/change_email', {method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({email})});
        const data = await res.json();
        if(data.status === 'ok'){
            showToast('✓ Email сохранён', 'success');
            document.getElementById('userEmail').textContent = email;
            closeModal('emailModal');
        } else showToast('✗ ' + (data.message || 'Ошибка'), 'error');
    }catch(e){ showToast('✗ Ошибка сервера', 'error'); }
}

async function clearChats(){
    if(!confirm('Очистить ВСЕ чаты?')) return;
    const chats = await fetch('/chats').then(r => r.json());
    for(const c of chats){
        await fetch('/clear_chat', {method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({chat:c.id})});
    }
    showToast('✓ Чаты очищены', 'success'); load();
}

function openAdminLogin(){
    const login = prompt('Логин администратора:'); if(!login) return;
    const password = prompt('Пароль администратора:'); if(!password) return;
    fetch('/admin_login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({login, password})})
    .then(r => r.json()).then(d => {
        if(d.status === 'ok') window.location.href = '/admin';
        else showToast('✗ Неверный логин или пароль', 'error');
    });
}

function doLogout(){
    if(confirm('Выйти из аккаунта?')) window.location.href = '/logout';
}

load();
</script>
</body>
</html>
